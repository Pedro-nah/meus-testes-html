<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias no HTML5</title>
</head>
<body>
    <h1>Imagens Dinâmicas</h1>
    <p>
        As imagens mudam de acordo com o tamanho da tela/janela!
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem Grande">
    </picture>
    <h1>
        Reproduzindo Aúdio
    </h1>
    <audio preload="metadata" controls>
        <source src="midia/bury-the-light.mp3" type="audio/mpeg"> 
    </audio>
    <br>
    (I AM THE STORM THAT IS APPROACHING) <br>
    <audio preload="metadata" controls>
        <source src="midia/eu-discordo.mp3" type="audio/mpeg">
    </audio>
    <br>
        <p>eeeeehhhhhh eu discordo</p>
</body>
</html>
